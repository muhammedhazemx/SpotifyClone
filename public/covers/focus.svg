<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050b06" />
      <stop offset="100%" stop-color="#0e1e10" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)" />
  
  <!-- Subtle Matrix-like Grid / Code Lines -->
  <g stroke="#10b981" stroke-width="0.5" opacity="0.15">
    <line x1="10" y1="0" x2="10" y2="300" />
    <line x1="30" y1="0" x2="30" y2="300" />
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="70" y1="0" x2="70" y2="300" />
    <line x1="90" y1="0" x2="90" y2="300" />
    <line x1="110" y1="0" x2="110" y2="300" />
    <line x1="130" y1="0" x2="130" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="170" y1="0" x2="170" y2="300" />
    <line x1="190" y1="0" x2="190" y2="300" />
    <line x1="210" y1="0" x2="210" y2="300" />
    <line x1="230" y1="0" x2="230" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" />
    <line x1="270" y1="0" x2="270" y2="300" />
    <line x1="290" y1="0" x2="290" y2="300" />
  </g>
  
  <!-- Programming Tags Outline -->
  <g fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0px 0px 8px #10b981)">
    <!-- &lt; -->
    <polyline points="90,110 50,140 90,170" />
    <!-- / -->
    <line x1="135" y1="95" x2="115" y2="185" />
    <!-- &gt; -->
    <polyline points="160,110 200,140 160,170" />
  </g>
  
  <!-- Glowing Cursor -->
  <rect x="212" y="115" width="12" height="40" fill="#10b981" filter="drop-shadow(0px 0px 5px #10b981)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>

  <!-- Text Overlay -->
  <text x="150" y="255" text-anchor="middle" font-family="'Montserrat', sans-serif" font-weight="900" font-size="20" fill="#10b981" letter-spacing="4" filter="drop-shadow(0px 0px 3px #10b981)">HEAVY FOCUS</text>
</svg>
