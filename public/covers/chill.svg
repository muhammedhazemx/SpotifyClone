<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="50%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#115e59" />
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)" />
  
  <!-- Ambient glowing circles -->
  <circle cx="230" cy="80" r="70" fill="#2dd4bf" filter="blur(40px)" opacity="0.3" />
  <circle cx="70" cy="220" r="80" fill="#0ea5e9" filter="blur(40px)" opacity="0.3" />
  
  <!-- Abstract Waves -->
  <path d="M0,150 Q75,100 150,160 T300,140 L300,300 L0,300 Z" fill="url(#waveGrad1)" />
  <path d="M0,180 Q80,220 160,170 T300,210 L300,300 L0,300 Z" fill="url(#waveGrad2)" />
  <path d="M0,220 Q70,180 140,230 T300,200 L300,300 L0,300 Z" fill="#042f2e" opacity="0.9" />
  
  <!-- Minimalist floating circles -->
  <circle cx="150" cy="90" r="8" fill="#e0f2fe" opacity="0.5" />
  <circle cx="180" cy="110" r="4" fill="#e0f2fe" opacity="0.4" />
  <circle cx="130" cy="120" r="5" fill="#e0f2fe" opacity="0.3" />

  <!-- Text Overlay -->
  <text x="150" y="270" text-anchor="middle" font-family="'Montserrat', sans-serif" font-weight="700" font-size="22" fill="#ffffff" letter-spacing="5">CHILL MIX</text>
</svg>
