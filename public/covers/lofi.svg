<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b2314" />
      <stop offset="100%" stop-color="#5c3a21" />
    </linearGradient>
    <linearGradient id="cup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)" />
  
  <!-- Cozy Window Grid Outline -->
  <rect x="30" y="30" width="240" height="180" rx="15" fill="none" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.2" />
  <line x1="150" y1="30" x2="150" y2="210" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.2" />
  <line x1="30" y1="120" x2="270" y2="120" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.2" />
  
  <!-- Warm moon outside window -->
  <circle cx="90" cy="80" r="25" fill="#fef08a" opacity="0.6" />
  
  <!-- Steam lines rising -->
  <path d="M140,210 Q135,195 143,180 T138,155" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5" />
  <path d="M155,210 Q160,195 152,180 T160,155" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5" />
  
  <!-- Coffee Cup -->
  <path d="M110,210 C110,240 120,250 150,250 C180,250 190,240 190,210 Z" fill="url(#cup)" />
  <!-- Coffee Cup Handle -->
  <path d="M190,218 C205,218 205,238 190,238" fill="none" stroke="url(#cup)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Plate -->
  <ellipse cx="150" cy="255" rx="55" ry="8" fill="#78350f" />
  
  <!-- Text Overlay -->
  <text x="150" y="285" text-anchor="middle" font-family="'Montserrat', sans-serif" font-weight="800" font-size="18" fill="#fef08a" letter-spacing="3">LO-FI VIBES</text>
</svg>
